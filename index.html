<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Corte de Gasolinera</title>

<style>

body{
font-family: Arial;
background:#0f2027;
background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:20px;
margin:0;
}

h1{
margin-bottom:10px;
}

.container{
max-width:400px;
margin:auto;
}

.bomba{
background:rgba(255,255,255,0.08);
padding:15px;
margin:15px 0;
border-radius:12px;
}

input{
display:block;
margin:6px auto;
padding:10px;
width:90%;
border-radius:8px;
border:none;
font-size:14px;
}

button{
padding:12px 25px;
background:#00c853;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#00a843;
}

#resultado{
white-space:pre-line;
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Corte de Gasolinera</h1>

<h3>Precios</h3>
<p>Magna: $23.99</p>
<p>Premium: $26.09</p>

<div class="bomba">

<input type="text" placeholder="Bomba 1" class="nombreBomba">

<h4>Magna</h4>
<input type="number" class="magnaInicio" placeholder="Lectura inicial">
<input type="number" class="magnaFinal" placeholder="Lectura final">

<h4>Premium</h4>
<input type="number" class="premiumInicio" placeholder="Lectura inicial">
<input type="number" class="premiumFinal" placeholder="Lectura final">

</div>

<div class="bomba">

<input type="text" placeholder="Bomba 2" class="nombreBomba">

<h4>Magna</h4>
<input type="number" class="magnaInicio" placeholder="Lectura inicial">
<input type="number" class="magnaFinal" placeholder="Lectura final">

<h4>Premium</h4>
<input type="number" class="premiumInicio" placeholder="Lectura inicial">
<input type="number" class="premiumFinal" placeholder="Lectura final">

</div>

<div class="bomba">

<input type="text" placeholder="Bomba 3" class="nombreBomba">

<h4>Magna</h4>
<input type="number" class="magnaInicio" placeholder="Lectura inicial">
<input type="number" class="magnaFinal" placeholder="Lectura final">

<h4>Premium</h4>
<input type="number" class="premiumInicio" placeholder="Lectura inicial">
<input type="number" class="premiumFinal" placeholder="Lectura final">

</div>

<div class="bomba">

<input type="text" placeholder="Bomba 4" class="nombreBomba">

<h4>Magna</h4>
<input type="number" class="magnaInicio" placeholder="Lectura inicial">
<input type="number" class="magnaFinal" placeholder="Lectura final">

<h4>Premium</h4>
<input type="number" class="premiumInicio" placeholder="Lectura inicial">
<input type="number" class="premiumFinal" placeholder="Lectura final">

</div>

<h3>Dinero recibido</h3>

<input type="number" id="efectivo" placeholder="Efectivo">
<input type="number" id="tarjeta" placeholder="Tarjeta">

<button onclick="calcular()">Calcular corte</button>

<button onclick="nuevoCorte()" style="background:#ff5252">Nuevo corte</button>

<div id="resultado"></div>

</div>

<script>

let precioMagna = 23.99
let precioPremium = 26.09

function calcular(){

let bombas = document.querySelectorAll(".bomba")

let totalMagna = 0
let totalPremium = 0

let texto = ""

bombas.forEach((bomba,i)=>{

let nombre = bomba.querySelector(".nombreBomba").value || "Bomba "+(i+1)

let mi = Number(bomba.querySelector(".magnaInicio").value)
let mf = Number(bomba.querySelector(".magnaFinal").value)

let pi = Number(bomba.querySelector(".premiumInicio").value)
let pf = Number(bomba.querySelector(".premiumFinal").value)

let magna = mf-mi
let premium = pf-pi

let ventaMagna = magna * precioMagna
let ventaPremium = premium * precioPremium

let totalBomba = ventaMagna + ventaPremium

totalMagna += magna
totalPremium += premium

texto +=
nombre+"\n"+
"Magna: "+magna.toFixed(2)+" L\n"+
"Premium: "+premium.toFixed(2)+" L\n"+
"Venta: $"+totalBomba.toFixed(2)+"\n\n"

})

let ventaMagnaTotal = totalMagna * precioMagna
let ventaPremiumTotal = totalPremium * precioPremium
let ventaTotal = ventaMagnaTotal + ventaPremiumTotal

let efectivo = Number(document.getElementById("efectivo").value)
let tarjeta = Number(document.getElementById("tarjeta").value)

let recibido = efectivo + tarjeta
let diferencia = recibido - ventaTotal

texto +=
"--------------------\n"+
"TOTAL GENERAL\n\n"+
"Magna vendidos: "+totalMagna.toFixed(2)+" L\n"+
"Premium vendidos: "+totalPremium.toFixed(2)+" L\n\n"+
"Venta Magna: $"+ventaMagnaTotal.toFixed(2)+"\n"+
"Venta Premium: $"+ventaPremiumTotal.toFixed(2)+"\n\n"+
"Total vendido: $"+ventaTotal.toFixed(2)+"\n"+
"Total recibido: $"+recibido.toFixed(2)+"\n\n"+
"Diferencia: $"+diferencia.toFixed(2)

document.getElementById("resultado").innerText = texto

guardarDatos()

}

function guardarDatos(){

let inputs = document.querySelectorAll("input")

let datos = []

inputs.forEach(input=>{
datos.push(input.value)
})

localStorage.setItem("gasolineraDatos",JSON.stringify(datos))

}

function cargarDatos(){

let datos = JSON.parse(localStorage.getItem("gasolineraDatos"))

if(!datos) return

let inputs = document.querySelectorAll("input")

inputs.forEach((input,i)=>{
input.value = datos[i]
})

}

function nuevoCorte(){

if(confirm("¿Seguro que quieres borrar el corte?")){

localStorage.removeItem("gasolineraDatos")
location.reload()

}

}

document.querySelectorAll("input").forEach(input=>{
input.addEventListener("input",guardarDatos)
})

cargarDatos()

</script>

</body>
</html>
